table: directus_oauth_clients

fields:
  - field: client_id
    width: half
  - field: client_name
    width: half
  - field: redirect_uris
    special:
      - cast-json
    width: full
  - field: grant_types
    special:
      - cast-json
    width: full
  - field: token_endpoint_auth_method
    width: half
  - field: date_created
    special:
      - date-created
      - cast-timestamp
    width: half
  - field: tokens
    interface: list-o2m
    special:
      - o2m
    width: full
    options:
      fields:
        - user.first_name
        - user.last_name
        - user.email
        - scope
        - expires_at
