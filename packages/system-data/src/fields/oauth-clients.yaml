table: directus_oauth_clients

fields:
  - field: client_id
    width: half
  - field: client_name
    width: half
  - field: redirect_uris
    special:
      - cast-json
    display: labels
    width: full
  - field: grant_types
    special:
      - cast-json
    display: labels
    width: full
  - field: token_endpoint_auth_method
    width: half
  - field: date_created
    special:
      - date-created
      - cast-timestamp
    width: half
  - field: tokens
    special:
      - o2m
    hidden: true
