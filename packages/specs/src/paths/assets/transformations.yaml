delete:
  summary: Clear Asset Transformations
  description:
    Purges cached asset transformations (thumbnails, resizes, format conversions) from storage. Optionally filter by one
    or more file IDs.
  operationId: clear-asset-transformations
  parameters:
    - name: files
      in: query
      description: UUID(s) of specific files to purge transformations for. If omitted, all transformations are purged.
      required: false
      schema:
        oneOf:
          - type: string
            format: uuid
          - type: array
            items:
              type: string
              format: uuid
  responses:
    '204':
      description: Successful request
    '401':
      $ref: '../../openapi.yaml#/components/responses/UnauthorizedError'
    '403':
      description: Forbidden - admin access required
  tags:
    - Assets
